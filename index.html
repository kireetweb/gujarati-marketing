<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gujarati Marketing | Air</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div class="fresh-air-bg"></div>

    <nav id="navbar" class="air-nav">
        <div class="nav-container">
            <h1 class="logo-text">Gujarati Marketing</h1>
        </div>
    </nav>

    <header id="hero">
        <div class="carousel-viewport">
            <div class="carousel-track" id="carousel-track">
                <div class="slide">
                    <div class="slide-content">
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-text"></div>
                    </div>
                    <div class="slide-visual">
                        <div class="skeleton skeleton-img"></div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section id="sponsors" class="reveal">
        <div class="section-header">
            <h2 class="section-title">Global Visionaries</h2>
            <p class="section-subtitle">Collaborating with platforms that redefine the digital horizon.</p>
        </div>
        <div class="sponsor-grid" id="sponsor-container">
            <div class="skeleton skeleton-logo"></div>
            <div class="skeleton skeleton-logo"></div>
            <div class="skeleton skeleton-logo"></div>
        </div>
    </section>

    <section id="cards" class="reveal">
        <div class="cards-grid" id="cards-container">
            </div>
    </section>

    <footer class="air-footer">
        <div class="footer-container">
            <div class="footer-brand">
                <h2 class="footer-logo">Gujarati Marketing</h2>
                <p class="footer-desc">Seamless connections. High-value audiences. Pure elegance.</p>
            </div>
            <div class="footer-social">
                <a href="#" class="social-link" target="_blank">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="#" class="social-link" target="_blank">
                    <i class="fa-brands fa-x-twitter"></i>
                </a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Gujarati Marketing.</p>
        </div>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
