<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gujarati Marketing | Premium Reach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="ambient-blur blur-saffron"></div>
    <div class="ambient-blur blur-green"></div>

    <nav id="navbar" class="glass-pill-nav">
        <h1 class="logo-text">Gujarati Marketing</h1>
    </nav>

    <header id="hero">
        <div class="carousel-container" id="carousel">
            <div class="slide">
                <div class="slide-text">
                    <div class="skeleton skeleton-text skeleton-title"></div>
                    <div class="skeleton skeleton-text skeleton-body"></div>
                    <div class="skeleton skeleton-text skeleton-body short"></div>
                </div>
                <div class="slide-image">
                    <div class="skeleton skeleton-img"></div>
                </div>
            </div>
        </div>
        <div id="scroll-indicator" class="hidden">
            <span class="scroll-text">Discover Excellence</span>
            <i class="fa-solid fa-arrow-down-long bounce"></i>
        </div>
    </header>

    <section id="sponsors" class="reveal">
        <h2 class="section-title">Trusted by Industry Leaders</h2>
        <div class="sponsor-grid" id="sponsor-container">
            <div class="skeleton skeleton-logo"></div>
            <div class="skeleton skeleton-logo"></div>
            <div class="skeleton skeleton-logo"></div>
        </div>
    </section>

    <section id="cards" class="reveal">
        <div class="cards-grid" id="cards-container">
            <div class="card glass">
                <div class="skeleton skeleton-text skeleton-title"></div>
                <div class="skeleton skeleton-text skeleton-body"></div>
                <div class="skeleton skeleton-text skeleton-body short"></div>
            </div>
            <div class="card glass">
                <div class="skeleton skeleton-text skeleton-title"></div>
                <div class="skeleton skeleton-text skeleton-body"></div>
                <div class="skeleton skeleton-text skeleton-body short"></div>
            </div>
            <div class="card glass">
                <div class="skeleton skeleton-text skeleton-title"></div>
                <div class="skeleton skeleton-text skeleton-body"></div>
                <div class="skeleton skeleton-text skeleton-body short"></div>
            </div>
        </div>
    </section>

    <footer class="minimal-footer">
        <p>&copy; 2026 Gujarati Marketing. Elevating brands.</p>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
