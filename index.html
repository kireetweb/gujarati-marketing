<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gujarati Marketing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav id="navbar" class="glass-nav">
        <div class="nav-content">
            <h1 class="logo-text">Gujarati Marketing</h1>
            <i class="fa-solid fa-search"></i>
        </div>
    </nav>

    <header id="hero">
        <div class="carousel-container" id="carousel">
            </div>
        <div id="scroll-indicator" class="hidden">
            <i class="fa-solid fa-chevron-down bounce"></i>
        </div>
    </header>

    <section id="sponsors" class="reveal">
        <h2 class="section-title">Featured Advertisers</h2>
        <div class="sponsor-grid" id="sponsor-container">
            </div>
    </section>

    <section id="cards" class="reveal">
        <div class="cards-grid" id="cards-container">
            </div>
    </section>

    <footer class="glass-footer">
        <p>Copyright 2026 Gujmarketing</p>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
