<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gujarati Marketing | Vanguard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500&family=Plus+Jakarta+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div class="vibrant-mesh">
        <div class="mesh-orb cyan"></div>
        <div class="mesh-orb pink"></div>
        <div class="mesh-orb yellow"></div>
        <div class="mesh-glass-overlay"></div>
    </div>

    <nav id="navbar" class="expert-nav">
        <div class="nav-container">
            <h1 class="logo-text">Gujarati Marketing</h1>
        </div>
    </nav>

    <header id="hero">
        <div class="carousel-viewport">
            <div class="carousel-track" id="carousel-track">
                <div class="slide">
                    <div class="slide-content">
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-text"></div>
                    </div>
                    <div class="slide-visual">
                        <div class="skeleton skeleton-img"></div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section id="sponsors" class="reveal cascade">
        <div class="section-header">
            <h2 class="section-title">Global Visionaries</h2>
            <p class="section-subtitle">Fusing technology and art with the world's most forward-thinking platforms.</p>
        </div>
        <div class="sponsor-grid" id="sponsor-container">
            <div class="skeleton skeleton-logo"></div>
            <div class="skeleton skeleton-logo"></div>
            <div class="skeleton skeleton-logo"></div>
        </div>
    </section>

    <section id="cards" class="reveal cascade">
        <div class="cards-grid" id="cards-container">
            </div>
    </section>

    <footer class="expert-footer">
        <div class="footer-container">
            <div class="footer-brand">
                <h2 class="footer-logo">Gujarati Marketing</h2>
                <p class="footer-desc">Redefining digital reach through unmatched aesthetic and technical brilliance.</p>
            </div>
            <div class="footer-social">
                <a href="#" class="magnetic-btn social-link" target="_blank">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="#" class="magnetic-btn social-link" target="_blank">
                    <i class="fa-brands fa-x-twitter"></i>
                </a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Gujarati Marketing. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
